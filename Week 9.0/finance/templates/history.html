{% extends "layout.html" %}
{% block main %}
<h2>History</h2>
<table>
    <tr><th>Symbol</th><th>Shares</th><th>Price</th><th>Date</th></tr>
    {% for t in transactions %}
        <tr>
            <td>{{ t.symbol }}</td>
            <td>{{ t.shares }}</td>
            <td>{{ t.price | usd }}</td>
            <td>{{ t.transacted }}</td>
        </tr>
    {% endfor %}
</table>
{% endblock %}

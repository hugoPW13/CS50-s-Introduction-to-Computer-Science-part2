{% extends "layout.html" %}
{% block main %}
<h2>Portfolio</h2>
<table>
<tr><th>Symbol</th><th>Name</th><th>Shares</th><th>Price</th><th>Total</th></tr>
{% for p in portfolio %}
<tr>
    <td>{{ p.symbol }}</td>
    <td>{{ p.name }}</td>
    <td>{{ p.shares }}</td>
    <td>{{ p.price | usd }}</td>
    <td>{{ p.total | usd }}</td>
</tr>
{% endfor %}
</table>
<p>Cash: {{ cash | usd }}</p>
<p>Grand Total: {{ grand_total | usd }}</p>
{% endblock %}

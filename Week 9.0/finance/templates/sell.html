{% extends "layout.html" %}

{% block main %}
<h2>Sell</h2>

<form action="/sell" method="post">
    <select name="symbol">
        {% for symbol in symbols %}
            <option value="{{ symbol }}">{{ symbol }}</option>
        {% endfor %}
    </select>
    <input name="shares" placeholder="Shares" type="number">
    <button type="submit">Sell</button>
</form>
{% endblock %}
